version: "1"

services:
  - type: web
    name: fleetpilot-api
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleetpilot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: fleetpilot-db
    region: ohio
    plan: free
    databaseName: fleetpilot
    user: fleetpilot
